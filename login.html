<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login-box{
width:350px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

.login-box h2{
text-align:center;
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:6px;
}

.login-box button{
width:100%;
padding:12px;
background:#1877f2;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<button>دخول</button>

</div>

</body>
</html>
